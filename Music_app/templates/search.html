{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Music Player</title>
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>

    <!-- Page Title -->
    <!-- Navbar -->
    <nav class="navbar">

        <div class="nav-left">
            <span class="logo">🎵 Music Player</span>
        </div>

        <div class="nav-right">
            <a href="{% url 'Music_app:index' %}">Home</a>
            <a href="{% url 'Music_app:upload_song' %}">Upload</a>
        </div>

    </nav>

    <h1>Search Music</h1>

    <form method="GET">
        <input type="text" name="q" placeholder="Search songs...">
        <button type="submit">Search</button>
    </form>

    <div class="music-container">

        {% for song in songs %}
        <div class="player"
            onclick="playSong('{{ song.preview }}', '{{ song.title }}', '{{ song.artist }}', '{{ song.image }}')">

            <img src="{{ song.image }}">
            <h2>{{ song.title }}</h2>
            <p>{{ song.artist }}</p>

        </div>
        {% endfor %}

    </div>

    <!-- Bottom Player -->
    <div class="bottom-player" id="bottomPlayer">

        <img id="playerImage">

        <div>
            <h3 id="playerTitle"></h3>
            <p id="playerArtist"></p>
        </div>

        <audio id="mainAudio" controls></audio>

    </div>

</body>

</html>
